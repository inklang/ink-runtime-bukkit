name: InkRuntime
main: org.inklang.runtime.bukkit.InkPlugin
version: 1.0.0-SNAPSHOT
api-version: 1.21
description: Bukkit/Paper runtime for Ink programming language
author: inklang
website: https://inklang.org
depend:
  - ink-runtime-bukkit
  - economy
  - brushogun
commands:
  ink:
    description: Manage Ink runtime
    usage: /ink reload| - Reload all scripts
    permission: ink.admin
  ink run:
    description: Execute an Ink script
    usage: /ink run <script>
    permission: ink.use
  ink list:
    description: List loaded scripts
    usage: /ink list
    permission: ink.use
permissions:
  ink.use:
    description: Use Ink scripts
    default: true
  ink.admin:
    description: Admin commands
    default: op
